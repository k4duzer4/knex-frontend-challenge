services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: knex-challange-2026-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - uploads:/uploads
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: postgres:16-alpine
    container_name: knex-challange-2026-db
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - app-network

volumes:
  pgdata:
  uploads:

networks:
  app-network:
    driver: bridge
